name: Tests

on:
  pull_request:
    paths:
      - "whitenoise-ios/**"
      - "whitenoise-iosTests/**"
      - "Shared/**"
      - "NotificationServiceExtension/**"
      - "Vendored/**"
      - "Config/**"
      - "whitenoise-ios.xcodeproj/**"
      - "scripts/test.sh"
      - ".github/workflows/tests.yml"
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      - name: Run tests
        run: ./scripts/test.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: build/TestResults.xcresult
          if-no-files-found: warn
